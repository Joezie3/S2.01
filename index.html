<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="tab-style.css">
  <script src="js/app.js" type="module"></script>
  <script src="js/jquery-4.0.0.js"></script>
  <script src="tab.js"></script>
</head>
<body>
<header><h1>Jeu de Memory</h1></header>
<template id="cardTemplate">
  <div class="card" data-selected=false>
    <div class="card-inner">
      <div class="card-front">
        <img src="./assets/images/mask1.jpg" draggable="false" alt="Hidden card">
      </div>
      <div class="card-back">
        <img draggable="false">
      </div>
    </div>
  </div>

</template>
<svg id="liens"></svg>
<div class="setup-form">
  <h2>Démarrer une nouvelle partie</h2>
  <form class="game-form">
    <label for="playername">Nom du joueur</label>
    <input type="text" id="playername">
    <label for="difficulty">Difficulté</label>
    <select id="difficulty">
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="8">8</option>
    </select>
    <label for="imageset">Set d'images</label>
    <select id="imageset">
      <option value="animals">Animaux</option>
      <option value="cars">Voitures</option>
      <option value="fruits">Fruits</option>
    </select>
    <button type="submit">Soumettre</button>
  </form>

</div>

<div class="game-area hidden">
  <div class="game-area-header">
    <h2 class="game-timer">00:00:00</h2>
    <button id="abandon">Abandon</button>
  </div>
  <div class="game-board"></div>
</div>
<div class="graphe-area hidden">
  <svg id="liens"></svg>
</div>
</body>
</html>
