<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" type="module"></script>
</head>
<body>
<div id="endgame-modal" class="modal hidden">
  <div class="modal-content">
    <h2 class="modal-title">Fin de la partie</h2>
    <p class="modal-message">Bravo ! Vous avez terminé la partie.</p>
    <div class="modal-stats">
      <div class="modal-stat">
        <span class="label">Temps</span>
        <span id="modal-time">00:00</span>
      </div>
      <div class="modal-stat">
        <span class="label">Score</span>
        <span id="modal-score">0</span>
      </div>
      <div class="modal-stat">
        <span class="label">Tentatives</span>
        <span id="modal-attemps">0</span>
      </div>
      <div class="modal-stat">
        <span class="label">Difficulté</span>
        <span id="modal-difficulty">0</span>
      </div>
      <div class="modal-stat">
        <span class="label">Mode</span>
        <span id="modal-mode"></span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="mainpage-modal-button" id="mainpage-modal-button">Retour au menu principal</button>
      <button class="restart-button" id="restart-modal-button">Recommencer (même paramètre)</button>
      <button id="close-modal-button">Fermer</button>
    </div>
  </div>
</div>
<header><h1>Jeu de Memory</h1></header>
<template id="cardTemplate">
  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="./assets/images/mask1.jpg" draggable="false" alt="Hidden card">
      </div>
      <div class="card-back">
        <img draggable="false" src="" alt="">
      </div>
    </div>
  </div>

</template>
<div class="setup-form">
  <h2>Démarrer une nouvelle partie</h2>
  <form class="game-form" method="post" action="" name="game-form">
    <label for="playername">Nom du joueur</label>
    <input type="text" id="playername" name="playername">
    <label for="difficulty">Difficulté</label>
    <select id="difficulty" name="difficulty">
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="8">8</option>
    </select>
    <label for="imageset">Set d'images</label>
    <select id="imageset" name="imageset">
      <option value="animals">Animaux</option>
      <option value="cars">Voitures</option>
      <option value="fruits">Fruits</option>
    </select>
    <label title="Le mode élimination autorise le joueur à faire trois erreurs, une fois les 3 erreurs commises, la partie est terminée." for="hardcore">Mode élimination (?)</label>
    <input id="hardcore" type="checkbox" name="hardcore">
    <label for="gamemode">Mode de jeu</label>
    <select id="gamemode" name="gamemode">
      <option value="regular">Memory classique</option>
      <option value="graphe">Memory graphe</option>
    </select>
    <button type="submit">Soumettre</button>
  </form>

</div>

<div class="game-area hidden">
  <div class="game-area-header">
    <h2 class="game-timer">00:00:00</h2>
    <div class="game-button-area">
      <button id="abandon">Abandon</button>
      <button class="restart-button" id="restart-button">Recommencer</button>
      <button id="show-result" class="hidden">Afficher les résultats</button>
    </div>
  </div>
  <div class="graphe-board hidden" id="graphe">
    <svg id="liens"></svg>
  </div>
  <div class="game-board hidden"></div>
</div>

</body>
</html>
